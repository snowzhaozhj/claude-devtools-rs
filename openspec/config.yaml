schema: spec-driven

context: |
  claude-devtools-rs 是 TypeScript Electron 应用 claude-devtools 的 Rust 端口，
  现为 Tauri + Svelte 桌面应用。TS 原版位于同级目录 ../claude-devtools，仅作
  历史参考；所有行为契约以本仓库 `openspec/specs/` 下的主 spec 为准。

  已知的 TS 实现 bug 见 `openspec/followups.md` —— 实现时按 spec 走，**不**
  复刻 TS 的 bug；若某个 change 在修这类 bug，在 proposal 与 tasks 中显式点名。

  语言：简体中文。所有 OpenSpec 产出物（proposal / design / tasks / spec delta
  / 主 spec Purpose 段）一律用简体中文撰写；RFC2119 关键词
  （SHALL / MUST / SHOULD / MAY / WHEN / THEN / AND / OR / NOT）保留英文。

  spec.md 是 behavior contract——具体写什么 / 不写什么 / 反例对照见
  `openspec/SPEC_GUIDE.md`，下方 `rules.specs` 是核心约定速查。

rules:
  proposal:
    - 一个 change 聚焦单一 capability（或紧耦合的少量 capability 组）
    - design.md 不是可选项——任何 change 都需 D1 / D2 / ... 决策记录，让 reviewer 能从设计层评估
  specs:
    - "一句话原则：如果实现可换而外部行为 / 协议不变，则该内容属 design.md 不属 spec。spec 描述『用户能感知什么 + 系统对外承诺什么』；design.md 描述『内部怎么实现』"
    - "下笔顺序：Purpose（用户价值，删了用户失去什么）→ FR（用户能做什么的外部可观察契约）→ NFR（性能 / 容量 / 延迟独立 Requirement，不与 FR 混）→ Cross-references（`[[other-cap]]` 引用，不复制协议字段）"
    - "MUST exclude（语义层，判断主权在 reviewer 与 codex 二审）：库选型 / 内部 fn-type-mod 名 / Rust 类型签名（`Vec<T>` 等）/ log target 字符串 / 实现选择类 SHALL（『通过 X 记录』『用 Y 缓存』）/ 测试 fixture 常量名 / 测试文件路径 / 配置文件字段路径（`tauri.conf.json::xxx`）/ Cargo-npm 依赖名+版本 / commit-PR-issue 号 / 实测数字与 baseline"
    - "词法 lint 信号：`scripts/check-spec-purity.sh` 抓 6 类反模式（mod-path / src-path / commit-hash / metric / impl-flag / lib-framework）走 baseline ratchet 防恶化。词法命中仅作 reviewer 自检雷达——命中 ≈ 极可能违反语义规则但反过来不成立，最终判断主权在 reviewer 与 codex 二审"
    - "backtick 用法：优先用于外部协议层标识符（IPC payload 字段名 camelCase 如 `messagesOmitted` / Tauri command snake_case 如 `ssh_connect` / HTTP path 如 `/api/projects` / 错误码 / push event 名）与 RFC2119 关键词；不得用 backtick 包装内部 fn / type / mod 名、源码路径、测试 fixture 常量、Cargo / npm 依赖等实现细节。Requirement / Scenario 描述使用简体中文，RFC2119 关键词保留英文"
    - "跨 spec 协议唯一 owner：同一 IPC payload / SSE event / 错误码不在多个 spec 重复 SHALL；用 `[[capability]]` 引用。测试 fixture 同步契约由 `frontend-test-pyramid::Rust IPC contract test 守护字段形状` 一处兜底；配置文件字段 / Cargo 依赖归 release-runbook 不进 spec"
    - "Scenario 标题视角：描述用户 / 系统可观察行为，禁用 const 名 / 回滚开关名 / 实现术语命名（如 `OMIT_*` / `Rollback flag` 不出现在 Scenario 标题）"
    - "完整指引与反例对照见 `openspec/SPEC_GUIDE.md`；已实践『删除尺子』见 change `openspec-slim-S-tier` / `openspec-slim-M-tier` 的 design.md；capability 边界重构远期计划见 GitHub Issue #296"
  tasks:
    - tasks 按 capability 对应的 owning crate 分组（capability → crate 映射见 CLAUDE.md）
# archive 相关约束见 openspec/CLAUDE.md 硬约束 #2/#3/#4（archive 非 spec-driven schema 的 artifact ID）
