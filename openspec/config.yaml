schema: spec-driven

context: |
  claude-devtools-rs 是 TypeScript Electron 应用 claude-devtools 的 Rust 端口，
  现为 Tauri + Svelte 桌面应用。TS 原版位于同级目录 ../claude-devtools，仅作
  历史参考；所有行为契约以本仓库 `openspec/specs/` 下的主 spec 为准。

  已知的 TS 实现 bug 见 `openspec/followups.md` —— 实现时按 spec 走，**不**
  复刻 TS 的 bug；若某个 change 在修这类 bug，在 proposal 与 tasks 中显式点名。

  语言：简体中文。所有 OpenSpec 产出物（proposal / design / tasks / spec delta
  / 主 spec Purpose 段）一律用简体中文撰写；RFC2119 关键词
  （SHALL / MUST / SHOULD / MAY / WHEN / THEN / AND / OR / NOT）保留英文。

  spec.md 是 behavior contract——backtick 引用仅允许外部协议层标识符
  （IPC payload 字段名 / HTTP path / Tauri command 名 / 错误码 /
  push event 名）；具体 spec 反模式与拦截规则见下方 `rules.specs`。
  design.md / tasks.md 才是放实现细节的地方。

rules:
  proposal:
    - 一个 change 聚焦单一 capability（或紧耦合的少量 capability 组）
    - design.md 不是可选项——任何 change 都需 D1 / D2 / ... 决策记录，让 reviewer 能从设计层评估
  specs:
    - "spec.md 是 behavior contract（行为契约），不是 implementation plan。Quick test：如果实现可以改而外部行为不变，则该内容不属于 spec，应迁到 design.md"
    - "Requirement / Scenario 描述使用简体中文；SHALL / MUST / SHOULD / MAY / WHEN / THEN / AND / OR / NOT 等 RFC2119 关键词保留英文"
    - "MUST exclude（六类反模式，由 CI scripts/check-spec-purity.sh 拦截）：(1) 内部模块/类/函数名（`crate::module::fn`、`struct InnerCache` 等）；(2) 源文件路径（.rs / .ts / .svelte / crates/ / src-tauri/src/ / ui/src/）；(3) commit hash / PR# / issue#（这些属诊断溯源，写 design.md 论证段）；(4) 实测诊断数据（具体 KB / MB / ms 数字、「实测 X 案例」、baseline 数字）；(5) 回滚开关 const 名（`OMIT_*` / `CROSS_*` / `STALE_*` 等具名）；(6) 库与框架选型（tokio / serde / axum / tauri-plugin-X / vitest / playwright 等）"
    - "backtick 引用仅允许：外部协议层标识符（IPC payload 字段名 camelCase 如 `messagesOmitted`、HTTP path 如 `/api/projects`、Tauri command 名 snake_case 如 `ssh_connect`、push event 名）+ 错误码 + RFC2119 关键词"
    - "膨胀软阈值：单个 spec.md 超过 500 行 SHOULD 评估是否拆 capability 或把内部论证 / 实现路径迁到 design.md。新增 Requirement body MUST 在 ~200 字内说清外部行为，超出说明在写实现细节"
    - "事件契约（payload 字段、错误码、ordering 约定、debounce / throttle 阈值数值）属于 spec；具体调度 / 缓存 / 重试机制实现属 design.md"
  tasks:
    - tasks 按 capability 对应的 owning crate 分组（capability → crate 映射见 CLAUDE.md）
# archive 相关约束见 openspec/CLAUDE.md 硬约束 #2/#3/#4（archive 非 spec-driven schema 的 artifact ID）
