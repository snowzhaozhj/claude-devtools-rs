name: frontend-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: vitest + svelte-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install ui deps
        working-directory: ui
        run: npm ci
      - name: vitest (with bundle test gated by RUN_BUNDLE_TESTS=1)
        working-directory: ui
        env:
          RUN_BUNDLE_TESTS: '1'
        run: npm run test:unit
      - name: svelte-check + tsc
        working-directory: ui
        run: npm run check

  e2e:
    name: playwright (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install ui deps
        working-directory: ui
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Chromium with deps
        working-directory: ui
        run: npx playwright install --with-deps chromium
      - name: Playwright run (chromium, workers=2)
        # `--update-snapshots` 让 toHaveScreenshot baseline 当次生成（spec
        # D5：跨 OS / Chromium 版本会有亚像素 diff，不 commit baseline，
        # CI 退化成「截图能截下来不报错」+ 失败时 artifact 给人审）。
        # 真正视觉守护靠 selector / role-based assertion + 失败 trace。
        working-directory: ui
        run: npm run test:e2e -- --workers=2 --update-snapshots
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: ui/test-results/
          retention-days: 7
