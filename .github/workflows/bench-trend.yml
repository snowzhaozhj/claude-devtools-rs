name: bench-trend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bench-trend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  deployments: write

env:
  CARGO_TERM_COLOR: always
  CDT_PERF_USE_FIXTURE: "1"

jobs:
  bench-trend:
    name: divan bench trend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev jq

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"
          prefix-key: v3-rust
          shared-key: bench-trend-${{ runner.os }}

      - name: Run divan benchmarks
        run: |
          scripts/run-divan-bench.sh > target/divan-results.json
          echo "::group::Benchmark results"
          cat target/divan-results.json | jq .
          echo "::endgroup::"
          echo "bench_count=$(jq length target/divan-results.json)" >> "$GITHUB_OUTPUT"
        id: bench

      - name: Upload benchmark results artifact
        uses: actions/upload-artifact@v7
        with:
          name: divan-bench-${{ github.run_id }}
          path: target/divan-results.json
          retention-days: 90

      - name: Store benchmark result (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Divan Benchmarks"
          tool: "customSmallerIsBetter"
          output-file-path: target/divan-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "130%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@snowzhaozhj"

      - name: Compare benchmark result (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Divan Benchmarks"
          tool: "customSmallerIsBetter"
          output-file-path: target/divan-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "130%"
          comment-on-alert: true
          fail-on-alert: false
          save-data-file: false
          comment-always: true
