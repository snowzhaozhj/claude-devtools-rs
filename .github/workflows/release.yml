name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 前置 job：在所有平台 build 跑前 atomically 创建一个 draft release，
  # 输出 release_id 给 build matrix 复用。修掉历史并发 race condition——
  # 之前 4 个 build job 各自 createRelease，结果一个 tag 下出现 4 个 draft
  # 各只含本平台 asset + 各自的 latest.json，无法 publish（详见 v0.4.2 事故）。
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/github-script@v9
        id: create-release
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Claude DevTools ${tag}`,
              body: [
                `## Claude DevTools ${tag}`,
                ``,
                `从下方 **Assets** 下载对应平台安装包：`,
                ``,
                `- macOS：\`.dmg\`（Apple Silicon / Intel）`,
                `- Linux：\`.deb\` / \`.AppImage\``,
                `- Windows：\`.msi\` / \`.exe\``,
                ``,
                `应用未代码签名，首次打开可能需要在系统设置放行。`,
                ``,
                `### CLI (\`cdt\`)`,
                ``,
                `一键安装：`,
                `\`\`\`bash`,
                `curl -fsSL https://raw.githubusercontent.com/snowzhaozhj/claude-devtools-rs/main/install.sh | sh`,
                `\`\`\``,
                ``,
                `或手动下载：\`cdt-darwin-arm64.tar.gz\` / \`cdt-linux-x64.tar.gz\` / \`cdt-windows-x64.zip\``,
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - os: macos-14
            label: macos-x64
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - os: ubuntu-24.04
            label: linux
            target: ""
            args: ""
          - os: windows-latest
            label: windows
            target: ""
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir ui run build

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          # 复用前置 job 创建好的 draft，避免并发 race。tauri-action 在
          # 给定 releaseId 时只上传 asset 并 merge latest.json，不会再调
          # createRelease——根因修复见 fix/release-workflow-race。
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # CLI standalone binary 构建（与 Tauri build 并行，不依赖 Node/WebKit）
  build-cli:
    name: Build CLI (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: darwin-arm64
            target: aarch64-apple-darwin
            asset: cdt-darwin-arm64.tar.gz
          - os: macos-14
            label: darwin-x64
            target: x86_64-apple-darwin
            asset: cdt-darwin-x64.tar.gz
          - os: ubuntu-24.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            asset: cdt-linux-x64.tar.gz
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            asset: cdt-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p cdt-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} cdt
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/cdt.exe" -DestinationPath "${{ matrix.asset }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --repo "${{ github.repository }}" --clobber

  # 末尾 gate：四平台 build 全成功后校验 asset 清单完整，再 un-draft。
  # 任一 asset 缺失 → 保留 draft + fail，Agent / 人工再介入；
  # 全齐 → 自动 publish，不再需要手动 `gh release edit --draft=false`。
  publish:
    name: Verify assets and publish
    needs: [build, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required assets present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' | sort -u)

          # 必需 asset 清单 = 4 平台首装包 + updater 链 (.app.tar.gz / .deb / -setup.exe + 各自 .sig) + latest.json。
          # 缺一即 fail：draft 保留供 inspect，re-run workflow 或 Agent 介入。
          REQUIRED=(
            # macOS 首装包（dmg 不参与 updater，故无 .sig）
            "Claude.DevTools_${VERSION}_aarch64.dmg"
            "Claude.DevTools_${VERSION}_x64.dmg"
            # macOS updater bundle (.app.tar.gz + .sig，updater 主力)
            "Claude.DevTools_aarch64.app.tar.gz"
            "Claude.DevTools_aarch64.app.tar.gz.sig"
            "Claude.DevTools_x64.app.tar.gz"
            "Claude.DevTools_x64.app.tar.gz.sig"
            # Linux 首装包 + .sig（updater 优先用 .deb；AppImage / rpm 备用）
            "Claude.DevTools_${VERSION}_amd64.deb"
            "Claude.DevTools_${VERSION}_amd64.deb.sig"
            "Claude.DevTools_${VERSION}_amd64.AppImage"
            "Claude.DevTools_${VERSION}_amd64.AppImage.sig"
            "Claude.DevTools-${VERSION}-1.x86_64.rpm"
            "Claude.DevTools-${VERSION}-1.x86_64.rpm.sig"
            # Windows 首装包 + .sig（updater 用 NSIS -setup.exe）
            "Claude.DevTools_${VERSION}_x64-setup.exe"
            "Claude.DevTools_${VERSION}_x64-setup.exe.sig"
            "Claude.DevTools_${VERSION}_x64_en-US.msi"
            "Claude.DevTools_${VERSION}_x64_en-US.msi.sig"
            # updater 元信息
            "latest.json"
            # CLI standalone binary
            "cdt-darwin-arm64.tar.gz"
            "cdt-darwin-x64.tar.gz"
            "cdt-linux-x64.tar.gz"
            "cdt-windows-x64.zip"
          )

          total=$(printf '%s\n' "$ASSETS" | wc -l | tr -d ' ')
          echo "Release $TAG 共 $total 个 asset"

          missing=()
          for f in "${REQUIRED[@]}"; do
            if ! printf '%s\n' "$ASSETS" | grep -qFx "$f"; then
              missing+=("$f")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::缺少必需 asset (${#missing[@]} 个):"
            printf '::error::  - %s\n' "${missing[@]}"
            echo "::error::Draft 保留供检查；修复后可 re-run 本 workflow 的 publish job"
            exit 1
          fi

          echo "✓ 全部 ${#REQUIRED[@]} 个必需 asset 齐全"

      - name: Publish release (un-draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" --draft=false
          echo "✓ Published ${GITHUB_REF_NAME}"
