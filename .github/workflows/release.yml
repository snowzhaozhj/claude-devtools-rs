name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 前置 job：在所有平台 build 跑前 atomically 创建一个 draft release，
  # 输出 release_id 给 build matrix 复用。修掉历史并发 race condition——
  # 之前 4 个 build job 各自 createRelease，结果一个 tag 下出现 4 个 draft
  # 各只含本平台 asset + 各自的 latest.json，无法 publish（详见 v0.4.2 事故）。
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/github-script@v9
        id: create-release
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Claude DevTools ${tag}`,
              body: [
                `## Claude DevTools ${tag}`,
                ``,
                `从下方 **Assets** 下载对应平台安装包：`,
                ``,
                `- macOS：\`.dmg\`（Apple Silicon / Intel）`,
                `- Linux：\`.deb\` / \`.AppImage\``,
                `- Windows：\`.msi\` / \`.exe\``,
                ``,
                `应用未代码签名，首次打开可能需要在系统设置放行。`,
                ``,
                `### CLI (\`cdt\`)`,
                ``,
                `一键安装：`,
                `\`\`\`bash`,
                `curl -fsSL https://raw.githubusercontent.com/snowzhaozhj/claude-devtools-rs/main/install.sh | sh`,
                `\`\`\``,
                ``,
                `或手动下载：\`cdt-darwin-arm64.tar.gz\` / \`cdt-linux-x64.tar.gz\` / \`cdt-windows-x64.zip\``,
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - os: macos-14
            label: macos-x64
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - os: ubuntu-24.04
            label: linux
            target: ""
            args: ""
          - os: windows-latest
            label: windows
            target: ""
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir ui run build

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          # 复用前置 job 创建好的 draft，避免并发 race。tauri-action 在
          # 给定 releaseId 时只上传 release assets/signatures，不创建 release；
          # latest.json 由 publish job 统一生成，避免矩阵阶段边上传边 merge updater metadata。
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # latest.json 由 publish job 在所有 release assets 齐全后统一生成；
          # 不让 tauri-action 在 draft/矩阵阶段边上传边 merge，避免写入 API asset URL。
          uploadUpdaterJson: false
          args: ${{ matrix.args }}

  # CLI standalone binary 构建（与 Tauri build 并行，不依赖 Node/WebKit）
  build-cli:
    name: Build CLI (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: darwin-arm64
            target: aarch64-apple-darwin
            asset: cdt-darwin-arm64.tar.gz
          - os: macos-14
            label: darwin-x64
            target: x86_64-apple-darwin
            asset: cdt-darwin-x64.tar.gz
          - os: ubuntu-24.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            asset: cdt-linux-x64.tar.gz
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            asset: cdt-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p cdt-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} cdt
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/cdt.exe" -DestinationPath "${{ matrix.asset }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --repo "${{ github.repository }}" --clobber

  # 末尾 gate：四平台 build 全成功后校验 asset 清单完整，再 un-draft。
  # 任一 asset 缺失 → 保留 draft + fail，Agent / 人工再介入；
  # 全齐 → 自动 publish，不再需要手动 `gh release edit --draft=false`。
  publish:
    name: Verify assets and publish
    needs: [create-release, build, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Verify non-updater assets present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' | sort -u)

          # publish job 自己直接依赖的必需 asset：首装 DMG + CLI standalone。
          # Updater asset + .sig 由下一步 Generate latest.json 的 manifest 统一校验并生成 updater 元信息。
          REQUIRED=(
            # macOS 首装包（dmg 不参与 updater，故无 .sig）
            "Claude.DevTools_${VERSION}_aarch64.dmg"
            "Claude.DevTools_${VERSION}_x64.dmg"
            # CLI standalone binary
            "cdt-darwin-arm64.tar.gz"
            "cdt-darwin-x64.tar.gz"
            "cdt-linux-x64.tar.gz"
            "cdt-windows-x64.zip"
          )

          total=$(printf '%s\n' "$ASSETS" | wc -l | tr -d ' ')
          echo "Release $TAG 共 $total 个 asset"

          missing=()
          for f in "${REQUIRED[@]}"; do
            if ! printf '%s\n' "$ASSETS" | grep -qFx "$f"; then
              missing+=("$f")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::缺少必需 asset (${#missing[@]} 个):"
            printf '::error::  - %s\n' "${missing[@]}"
            echo "::error::Draft 保留供检查；修复后可 re-run 本 workflow 的 publish job"
            exit 1
          fi

          echo "✓ 全部 ${#REQUIRED[@]} 个必需 asset 齐全"

      - name: Generate latest.json
        uses: actions/github-script@v9
        env:
          TAG: ${{ github.ref_name }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const tag = process.env.TAG;
            const releaseId = Number(process.env.RELEASE_ID);
            const version = tag.replace(/^v/, "");
            const { owner, repo } = context.repo;

            if (!Number.isSafeInteger(releaseId) || releaseId <= 0) {
              throw new Error(`invalid release id from create-release job: ${process.env.RELEASE_ID}`);
            }
            const { data: release } = await github.rest.repos.getRelease({
              owner,
              repo,
              release_id: releaseId,
            });
            if (release.tag_name !== tag) {
              throw new Error(`release id ${releaseId} points to ${release.tag_name}, expected ${tag}`);
            }
            if (!release.draft) {
              throw new Error(`release ${tag} is already published; refusing to replace latest.json`);
            }
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.id,
              per_page: 100,
            });
            const byName = new Map(assets.map((asset) => [asset.name, asset]));

            const asset = (name) => {
              const found = byName.get(name);
              if (!found) {
                throw new Error(`missing release asset: ${name}`);
              }
              return found;
            };
            const signature = async (name) => {
              const sigAsset = asset(`${name}.sig`);
              const response = await github.request(
                "GET /repos/{owner}/{repo}/releases/assets/{asset_id}",
                {
                  owner,
                  repo,
                  asset_id: sigAsset.id,
                  headers: { accept: "application/octet-stream" },
                },
              );
              const text = Buffer.from(response.data).toString("utf8").trim();
              if (!text) {
                throw new Error(`empty signature asset: ${sigAsset.name}`);
              }
              return text;
            };
            const releaseDownloadUrl = (name) => {
              // Draft release assets expose transient "untagged-*" browser URLs.
              // Updater metadata must use the stable tag URL that becomes public after un-draft.
              asset(name);
              return `https://github.com/${owner}/${repo}/releases/download/${tag}/${encodeURIComponent(name)}`;
            };
            const entry = async (name) => ({
              signature: await signature(name),
              url: releaseDownloadUrl(name),
            });

            // Keep this manifest aligned with tauri-action@v1's updater JSON platform mapping.
            // Re-check it when upgrading tauri-action or changing bundle types.
            const updaterAssets = [
              {
                name: `Claude.DevTools_${version}_aarch64.app.tar.gz`,
                platforms: ["darwin-aarch64", "darwin-aarch64-app"],
              },
              {
                name: `Claude.DevTools_${version}_x64.app.tar.gz`,
                platforms: ["darwin-x86_64", "darwin-x86_64-app"],
              },
              {
                name: `Claude.DevTools_${version}_amd64.AppImage`,
                platforms: ["linux-x86_64", "linux-x86_64-appimage"],
              },
              {
                name: `Claude.DevTools_${version}_amd64.deb`,
                platforms: ["linux-x86_64-deb"],
              },
              {
                name: `Claude.DevTools-${version}-1.x86_64.rpm`,
                platforms: ["linux-x86_64-rpm"],
              },
              {
                // windows-x86_64 保持 tauri-action 既有默认：MSI；NSIS 只写入 -nsis 专用 key。
                name: `Claude.DevTools_${version}_x64_en-US.msi`,
                platforms: ["windows-x86_64", "windows-x86_64-msi"],
              },
              {
                name: `Claude.DevTools_${version}_x64-setup.exe`,
                platforms: ["windows-x86_64-nsis"],
              },
            ];

            const platforms = {};
            for (const item of updaterAssets) {
              const value = await entry(item.name);
              for (const platform of item.platforms) {
                platforms[platform] = value;
              }
            }

            const latest = {
              version,
              notes: "",
              pub_date: new Date().toISOString(),
              platforms,
            };

            const expectedPlatforms = updaterAssets.flatMap((item) => item.platforms).sort();
            const actualPlatforms = Object.keys(latest.platforms).sort();
            if (JSON.stringify(actualPlatforms) !== JSON.stringify([...expectedPlatforms].sort())) {
              throw new Error(`latest.json platform keys mismatch: ${actualPlatforms.join(", ")}`);
            }
            for (const [platform, value] of Object.entries(latest.platforms)) {
              if (!value.signature || typeof value.signature !== "string") {
                throw new Error(`missing signature for ${platform}`);
              }
              if (!value.url.startsWith(`https://github.com/${owner}/${repo}/releases/download/${tag}/`)) {
                throw new Error(`invalid download URL for ${platform}: ${value.url}`);
              }
            }

            const existingLatest = byName.get("latest.json");
            if (existingLatest) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existingLatest.id,
              });
            }
            const latestJson = JSON.stringify(latest, null, 2) + "\n";
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name: "latest.json",
              data: latestJson,
              headers: {
                "content-type": "application/json",
                "content-length": Buffer.byteLength(latestJson),
              },
            });
            core.info("✓ latest.json generated from current release assets");

      - name: Publish release (un-draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" --draft=false
          echo "✓ Published ${GITHUB_REF_NAME}"
