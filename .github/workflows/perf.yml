name: perf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

# GH 2024 起默认 GITHUB_TOKEN 不再隐式带 issues:write / pull-requests:write，
# 必须显式声明，否则 actions/github-script 的 createComment / updateComment
# 报 403 Resource not accessible by integration。
permissions:
  contents: read
  pull-requests: write
  issues: write

# CI runner 没有真实 `~/.claude/projects/` corpus，因此 perf tests 通过
# `CDT_PERF_USE_FIXTURE=1` 生成临时 Claude projects fixture 后真实测量。
# 若 bench 被跳过，脚本返回失败，避免"无数据但成功"的虚假 perf gate。

env:
  CARGO_TERM_COLOR: always
  CDT_PERF_USE_FIXTURE: "1"

jobs:
  perf:
    name: perf bench (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev jq
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"
          # 与 ci.yml 同步用 v3-rust prefix-key——共享同一 cache pool 避免重复编译
          # cdt-* crates；shared-key 让 perf job 复用 test job 已编好的 deps。
          prefix-key: v3-rust
          shared-key: perf-${{ runner.os }}
      - name: 校验 baseline JSON schema
        run: |
          jq -e '.thresholds and .benches and (.benches | length > 0)' tests/perf-baseline.json \
            || { echo "baseline JSON 不合法"; exit 1; }
      - name: 跑 perf bench
        id: bench
        run: |
          set +e
          bash scripts/run-perf-bench.sh --runs 3 --out target/perf-report.json
          ec=$?
          set -e
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          exit "$ec"
      - name: 上传 perf 报告 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ github.run_id }}
          path: target/perf-report.json
          retention-days: 30
      - name: 渲染 PR 评论
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        env:
          PERF_EXIT_CODE: ${{ steps.bench.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const path = 'target/perf-report.json';
            if (!fs.existsSync(path)) {
              core.info('perf-report.json 未生成，跳过评论');
              return;
            }
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const exitCode = process.env.PERF_EXIT_CODE || '?';

            const MARKER = '<!-- perf-gate-bot -->';
            const results = report.results || [];
            const failed = results.filter(r =>
              r.status !== 'measured' || (r.regressions && r.regressions.length > 0)
            );
            const measuredCount = results.filter(r => r.status === 'measured').length;
            const verdict = failed.length === 0 ? 'PASS' : 'FAIL';

            const fmtDelta = (m) => {
              if (!m || m.delta_pct == null) return '—';
              return `${m.delta_pct > 0 ? '+' : ''}${m.delta_pct}%`;
            };
            const fmtMs = (m) => m ? `${m.actual} ms (${fmtDelta(m)})` : '—';
            const fmtRatio = (m) => m ? `${m.actual} / ≤${m.threshold_max}` : '—';
            const fmtRss = (m) => {
              if (!m || m.actual == null) return '—';
              return `${(m.actual / 1024).toFixed(1)} MB (${fmtDelta(m)})`;
            };
            const fmtDetailCell = (m, unit = '') => {
              if (m == null) return '—';
              if (typeof m === 'object' && 'actual' in m) {
                const actual = unit ? `${m.actual} ${unit}` : `${m.actual}`;
                const delta = m.delta_pct != null ? ` · ${fmtDelta(m)}` : '';
                const threshold = m.threshold_pct != null ? ` · gate +${m.threshold_pct}%`
                  : m.threshold_max != null ? ` · gate ≤${m.threshold_max}` : '';
                return `${actual}${delta}<br/>base ${m.baseline ?? '—'}${unit ? ` ${unit}` : ''}${threshold}${m.fail ? ' · FAIL' : ''}`;
              }
              return String(m);
            };
            const fmtKeySignal = (r) => {
              const internal = r.internal || {};
              if (internal.cold_total_ms != null) return `cold total ${internal.cold_total_ms} ms`;
              if (internal.largest_payload_kb != null || internal.largest_ipc_ms != null) {
                const payload = internal.largest_payload_kb != null ? `${internal.largest_payload_kb} KB` : '—';
                const ipc = internal.largest_ipc_ms != null ? `${internal.largest_ipc_ms} ms` : '—';
                return `payload ${payload}, IPC ${ipc}`;
              }
              return Object.keys(internal).length ? `\`${JSON.stringify(internal)}\`` : '—';
            };
            const statusLabel = (r) => {
              if (r.status !== 'measured') return `FAIL (${r.status})`;
              return (r.regressions && r.regressions.length) ? 'FAIL (regression)' : 'PASS';
            };

            let body = `${MARKER}\n## Performance bench report\n\n`;
            body += `**Verdict: ${verdict}** — ${measuredCount}/${results.length} measured, ${failed.length} failing · runs \`${report.runs}\` · OS \`${report.os}\` · script exit \`${exitCode}\`\n\n`;
            body += `> CI uses \`CDT_PERF_USE_FIXTURE=1\` to generate a temporary Claude projects corpus. Any \`skipped\` bench fails the gate.\n\n`;

            if (failed.length) {
              body += `### Required action\n`;
              for (const r of failed) {
                if (r.status === 'skipped') {
                  body += `- \`${r.name}\`: skipped — ${r.reason || 'no reason reported'}\n`;
                } else if (r.status === 'error') {
                  body += `- \`${r.name}\`: error — ${r.error || 'unknown error'}\n`;
                } else {
                  for (const item of (r.regressions || [])) body += `- \`${r.name}\`: ${item}\n`;
                }
              }
              body += '\n';
            }

            body += `### Summary\n\n`;
            body += `| Bench | Status | Wall | CPU user | RSS | user/real | Key signal |\n`;
            body += `|---|---:|---:|---:|---:|---:|---|\n`;
            for (const r of results) {
              if (r.status !== 'measured') {
                body += `| \`${r.name}\` | ${statusLabel(r)} | — | — | — | — | ${r.reason || r.error || '—'} |\n`;
                continue;
              }
              body += `| \`${r.name}\` | ${statusLabel(r)} | ${fmtMs(r.metrics.wall_ms)} | ${fmtMs(r.metrics.user_ms)} | ${fmtRss(r.metrics.max_rss_kb)} | ${fmtRatio(r.metrics.user_real_ratio)} | ${fmtKeySignal(r)} |\n`;
            }
            body += '\n';

            body += `<details>\n<summary>Full metrics</summary>\n\n`;
            for (const r of results) {
              body += `#### \`${r.name}\` — ${statusLabel(r)}\n\n`;
              if (r.status === 'skipped') {
                body += `> ${r.reason || 'skipped'}\n\n`;
                continue;
              }
              if (r.status === 'error') {
                body += `> ${r.error || 'error'}\n\n`;
                continue;
              }
              body += `| Metric | Actual / delta / gate |\n|---|---|\n`;
              body += `| wall | ${fmtDetailCell(r.metrics.wall_ms, 'ms')} |\n`;
              body += `| user | ${fmtDetailCell(r.metrics.user_ms, 'ms')} |\n`;
              body += `| sys (info) | ${fmtDetailCell(r.metrics.sys_ms, 'ms')} |\n`;
              body += `| max RSS | ${fmtDetailCell(r.metrics.max_rss_kb, 'KB')} |\n`;
              body += `| user/real | ${fmtDetailCell(r.metrics.user_real_ratio)} |\n`;
              if (r.internal && Object.keys(r.internal).length) {
                body += `\ninternal: \`${JSON.stringify(r.internal)}\`\n`;
              }
              body += '\n';
            }
            body += `</details>\n\n`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = [];
              for (let page = 1; ; page++) {
                const { data } = await github.rest.issues.listComments({
                  owner, repo, issue_number, per_page: 100, page,
                });
                comments.push(...data);
                if (data.length < 100) break;
              }
              const existing = comments.find(c => c.body && c.body.startsWith(MARKER));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body,
                });
                core.info(`updated comment ${existing.id}`);
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number, body,
                });
                core.info('created new perf comment');
              }
            } catch (error) {
              // 永久性客户端错误（400/401/403）= 配置 bug，SHALL fatal：
              //   400 参数构造错（PR 模板写错了）
              //   401 认证 token 错 / permissions 块缺失
              //   403 "Resource not accessible by integration"（permissions
              //       缺失，第一轮 CI 已踩过）
              // 偶发/可恢复错误走 warning：
              //   422 GH 既用于 validation 也用于 spam 检测，无法静态区分（spam
              //       是运行时偶发不是 bug），保留 warning 避免假阳性
              //   404 评论被人删 / 5xx GH 服务波动
              const status = error.status || error.response?.status;
              if (status === 400 || status === 401 || status === 403) {
                core.setFailed(`PR 评论发布失败（配置错 status=${status}）：${error.message}`);
              } else {
                core.warning(`PR 评论发布失败（status=${status ?? '?'}），跳过：${error.message}`);
              }
            }
