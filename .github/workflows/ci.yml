name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  openspec:
    name: openspec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec
      - name: Validate OpenSpec specs and changes
        run: openspec validate --all --strict
      - name: Check completed changes are archived
        run: bash scripts/check-openspec-archives.sh

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # `cache-bin: false` 是彻底修法——不缓存 `~/.cargo/bin/`，避免 rustup
          # "单 binary 多入口"设计（cargo/rustc/rustup/rustup-init 同一可执行
          # 文件，靠 argv[0] 分发）在 cache restore 时被覆盖成 rustup-init stub，
          # 报 `unexpected argument 'test' / 'clippy'`。toolchain 每次让
          # dtolnay/rust-toolchain 干净装（~10s），只缓存 registry / git / target。
          cache-bin: "false"
          # prefix-key bump 跳出污染池：v0→v1（首次），v1→v2（PR #57），
          # v2→v3（cache-bin: false 上线时清池，确保不再 hit 含 toolchain 的旧 cache）。
          prefix-key: v3-rust
      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # `cache-bin: false` 是彻底修法——不缓存 `~/.cargo/bin/`，避免 rustup
          # "单 binary 多入口"设计（cargo/rustc/rustup/rustup-init 同一可执行
          # 文件，靠 argv[0] 分发）在 cache restore 时被覆盖成 rustup-init stub，
          # 报 `unexpected argument 'test' / 'clippy'`。toolchain 每次让
          # dtolnay/rust-toolchain 干净装（~10s），只缓存 registry / git / target。
          cache-bin: "false"
          # prefix-key bump 跳出污染池：v0→v1（首次），v1→v2（PR #57），
          # v2→v3（cache-bin: false 上线时清池，确保不再 hit 含 toolchain 的旧 cache）。
          prefix-key: v3-rust
      - name: cargo test --workspace (cdt-watch excluded)
        # `cdt-api/test-utils` feature 启用集成测试访问 cache 内部状态的 helper
        # （详 change `parsed-message-lru-cache`）；release/默认构建不含。
        run: cargo test --workspace --exclude cdt-watch --features cdt-api/test-utils --locked
      - name: cargo test -p cdt-watch (single-threaded)
        run: cargo test -p cdt-watch --locked -- --test-threads=1
