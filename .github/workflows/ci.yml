name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # bump 跳出污染池：macOS 上历史 cache 中毒（cargo 二进制被覆盖成
          # rustup-init 副本，报 unexpected argument 'clippy' / 'test'）。
          # v0→v1（首次 bump），v1→v2（PR #57 时 test (macos-14) 再次中毒）。
          prefix-key: v2-rust
      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # bump 跳出污染池：macOS 上历史 cache 中毒（cargo 二进制被覆盖成
          # rustup-init 副本，报 unexpected argument 'clippy' / 'test'）。
          # v0→v1（首次 bump），v1→v2（PR #57 时 test (macos-14) 再次中毒）。
          prefix-key: v2-rust
      - name: cargo test --workspace (cdt-watch excluded)
        run: cargo test --workspace --exclude cdt-watch --locked
      - name: cargo test -p cdt-watch (single-threaded)
        run: cargo test -p cdt-watch --locked -- --test-threads=1
