name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  openspec:
    name: openspec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec
      - name: Validate OpenSpec specs and changes
        run: openspec validate --all --strict
      - name: Check completed changes are archived
        run: bash scripts/check-openspec-archives.sh
      - name: Check spec purity (threshold gate)
        run: bash scripts/check-spec-purity.sh
      - name: Spec purity rule self-test
        run: bash scripts/check-spec-purity.sh --test

  ipc-sync:
    name: ipc command sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Check Tauri command sync (3 sources)
        run: bash scripts/check-ipc-command-sync.sh

  hot-path-no-event:
    name: hot-path no event!()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Check no cdt_telemetry::event!() in hot-path files
        run: bash scripts/check-no-hot-event.sh

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all -- --check

  fs-abstraction:
    name: xtask check-fs-direct-calls
    # H1 enforce 机制（unify-fs-abstraction + unify-fs-direct-calls change）：
    # 扫业务 crate 是否含 `tokio::fs::*` 直调；allowlist 真相源
    # `crates/cdt-fs/ALLOWLIST.md`。本 step 默认 fail-on-match enforce
    # （change `unify-fs-direct-calls` design D4）；本地诊断用 `--warn-only` opt-in。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"
          prefix-key: v3-rust
      - name: cargo xtask check-fs-direct-calls
        run: cargo xtask check-fs-direct-calls

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # `cache-bin: false` 是彻底修法——不缓存 `~/.cargo/bin/`，避免 rustup
          # "单 binary 多入口"设计（cargo/rustc/rustup/rustup-init 同一可执行
          # 文件，靠 argv[0] 分发）在 cache restore 时被覆盖成 rustup-init stub，
          # 报 `unexpected argument 'test' / 'clippy'`。toolchain 每次让
          # dtolnay/rust-toolchain 干净装（~10s），只缓存 registry / git / target。
          cache-bin: "false"
          # prefix-key bump 跳出污染池：v0→v1（首次），v1→v2（PR #57），
          # v2→v3（cache-bin: false 上线时清池，确保不再 hit 含 toolchain 的旧 cache）。
          prefix-key: v3-rust
      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # `cache-bin: false` 是彻底修法——不缓存 `~/.cargo/bin/`，避免 rustup
          # "单 binary 多入口"设计（cargo/rustc/rustup/rustup-init 同一可执行
          # 文件，靠 argv[0] 分发）在 cache restore 时被覆盖成 rustup-init stub，
          # 报 `unexpected argument 'test' / 'clippy'`。toolchain 每次让
          # dtolnay/rust-toolchain 干净装（~10s），只缓存 registry / git / target。
          cache-bin: "false"
          # prefix-key bump 跳出污染池：v0→v1（首次），v1→v2（PR #57），
          # v2→v3（cache-bin: false 上线时清池，确保不再 hit 含 toolchain 的旧 cache）。
          prefix-key: v3-rust
      # cargo-nextest 走 GitHub Release 直下二进制（~5s vs `cargo install` ~30s），
      # 与 `cache-bin: false` 兼容（不依赖 ~/.cargo/bin 缓存）
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run --workspace
        # `cdt-api/test-utils` feature 启用集成测试访问 cache 内部状态的 helper
        # （详 change `parsed-message-lru-cache`）；release/默认构建不含。
        # `--profile ci`：fail-fast 关闭收完整失败清单 + cdt-watch retries=2
        # cdt-watch override 在 `.config/nextest.toml`：进程隔离 + retry 抹平 FSEvents flaky
        run: cargo nextest run --workspace --features cdt-api/test-utils --locked --profile ci
      # 不跑 doctest：当前仓 ` ``` ` 标记全为 sh/ts/ignore（无 runnable rust doctest）。
      # 未来加 runnable doctest 时再评估是否恢复 `cargo test --doc` 兜底。
